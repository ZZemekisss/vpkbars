<script>
// Функция для открытия фото в модальном окне
function openPhotoModal(imageUrl) {
    // Создаем модальное окно
    const modal = document.createElement('div');
    modal.style.position = 'fixed';
    modal.style.top = '0';
    modal.style.left = '0';
    modal.style.width = '100%';
    modal.style.height = '100%';
    modal.style.backgroundColor = 'rgba(0,0,0,0.95)';
    modal.style.zIndex = '9999';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.style.cursor = 'pointer';
    modal.style.opacity = '0';
    modal.style.transition = 'opacity 0.3s ease';
    
    // Добавляем изображение
    const img = document.createElement('img');
    img.src = imageUrl;
    img.style.maxWidth = '90%';
    img.style.maxHeight = '90%';
    img.style.objectFit = 'contain';
    img.style.borderRadius = '10px';
    img.style.transform = 'scale(0.9)';
    img.style.transition = 'transform 0.3s ease';
    
    modal.appendChild(img);
    
    // Анимация появления
    setTimeout(() => {
        modal.style.opacity = '1';
        img.style.transform = 'scale(1)';
    }, 10);
    
    // Закрываем по клику на фон
    modal.onclick = function(e) {
        // Если кликнули на модальное окно (не на изображение)
        if (e.target === modal) {
            modal.style.opacity = '0';
            setTimeout(() => {
                document.body.removeChild(modal);
            }, 300);
        }
    };
    
    // Закрываем по кнопке Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.body.contains(modal)) {
            modal.style.opacity = '0';
            setTimeout(() => {
                if (document.body.contains(modal)) {
                    document.body.removeChild(modal);
                }
            }, 300);
        }
    });
    
    document.body.appendChild(modal);
}

// Функция для получения чистого URL изображения из background-image
function getImageUrlFromBg(element) {
    const bgImage = element.style.backgroundImage;
    if (!bgImage || bgImage === 'none') return null;
    
    // Извлекаем URL из background-image: url("...")
    const match = bgImage.match(/url\(["']?([^"')]+)["']?\)/);
    if (match && match[1]) {
        // Очищаем URL от параметров (?quality=95&as=...)
        return match[1].split('?')[0];
    }
    return null;
}

// Добавляем обработчики кликов на все фото при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
    // Находим все элементы с фото
    const photoRows = document.querySelectorAll('.photos_row');
    
    photoRows.forEach(row => {
        // Удаляем старые обработчики (если есть)
        const oldLink = row.querySelector('a');
        
        // Создаем новый обработчик клика
        row.style.cursor = 'pointer';
        
        row.addEventListener('click', function(e) {
            // Предотвращаем всплытие, чтобы не сработали другие обработчики
            e.stopPropagation();
            
            // Получаем URL изображения
            let imageUrl = getImageUrlFromBg(this);
            
            // Если не получили из background-image, пробуем найти внутри img
            if (!imageUrl) {
                const img = this.querySelector('img');
                if (img && img.src) {
                    imageUrl = img.src.split('?')[0];
                }
            }
            
            if (imageUrl) {
                openPhotoModal(imageUrl);
            } else {
                console.warn('Не удалось получить URL изображения');
            }
        });
        
        // Если есть вложенная ссылка, отключаем её стандартное поведение
        const link = row.querySelector('a');
        if (link) {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            });
        }
    });
});
</script>
